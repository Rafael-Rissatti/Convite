<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Convite Pokémon - Gael 5 anos!</title>
    <link rel="icon" href="{{ url_for('static', filename='ico/ico.ico') }}" sizes="any">
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='ico/ico.png') }}">
    <link rel="preload" href="{{ url_for('static', filename='sound/theme.mp3') }}" as="audio" type="audio/mpeg">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="invite-page">
    <div class="sky-badge badge-one"></div>
    <div class="sky-badge badge-two"></div>
    <div class="sky-badge badge-three"></div>
    <div class="grass-bottom"></div>

    <div class="pokemon-stage" aria-hidden="true">
        <div class="pokemon-side pokemon-side-left">
            <img class="pokemon-friend gastly" src="{{ url_for('static', filename='image/gastly.png') }}" alt="">
            <img class="pokemon-friend bulba" src="{{ url_for('static', filename='image/bulba.png') }}" alt="">
            <img class="pokemon-friend pikachu" src="{{ url_for('static', filename='pikachu1.png') }}" alt="">
            <img class="pokemon-friend charmander" src="{{ url_for('static', filename='image/charmander.png') }}" alt="">
        </div>
        <div class="pokemon-side pokemon-side-right">
            <img class="pokemon-friend meowth" src="{{ url_for('static', filename='Miaud.png') }}" alt="">
            <img class="pokemon-friend gengar" src="{{ url_for('static', filename='image/gengar.png') }}" alt="">
            <img class="pokemon-friend squirtle" src="{{ url_for('static', filename='image/squirtle.png') }}" alt="">
            <img class="pokemon-friend psyduck" src="{{ url_for('static', filename='psye.png') }}" alt="">
        </div>
    </div>

    <div class="pokedex-card">
        <header class="card-header">
            <div class="trainer-chip">Convite de treinador</div>
            <h1>Gael 5 anos!</h1>
            <p>Prepare sua Pokébola e confirme presença para entrar nessa aventura.</p>
            <div class="party-date">27/06/2026 das 16:00 às 20:00</div>
            <a class="map-link" href="https://www.google.com/maps/place/Zig+Zag+Divers%C3%B5es+%26+Festas/@-20.742967,-48.909516,18z/data=!4m10!1m2!2m1!1szigzag!3m6!1s0x94bc6f9741894e45:0x7366001f90f37abe!8m2!3d-20.742967!4d-48.9075138!15sCgZ6aWd6YWeSARZjaGlsZHJlbnNfcGFydHlfYnVmZmV04AEA!16s%2Fg%2F11j0s1pqdz?entry=ttu&amp;g_ep=EgoyMDI2MDYwMy4xIKXMDSoASAFQAw%3D%3D" target="_blank" rel="noopener noreferrer">Local: Zig Zag Diversões &amp; Festas</a>
            <div class="response-deadline">Responder até 20/06/2026</div>
        </header>

        <div class="divider" aria-hidden="true"></div>

        <main class="card-body">
            <form id="rsvpForm">
                <div class="form-group">
                    <label for="nome"><span class="label-icon pokeball-mini"></span>Convidado(a)</label>
                    <input type="text" id="nome" name="nome" placeholder="Seu nome de convidado" required>
                </div>

                <div class="form-group">
                    <label for="acompanhante"><span class="label-icon lightning-mini"></span>Parceiro de jornada</label>
                    <input type="text" id="acompanhante" name="acompanhante" placeholder="Nome do acompanhante">
                </div>

                <div class="form-group">
                    <label><span class="label-icon badge-mini"></span>Vai participar da aventura?</label>
                    <div class="radio-grid">
                        <div class="radio-option">
                            <input type="radio" id="sim" name="status" value="sim" required>
                            <label for="sim">
                                <strong>Vou batalhar</strong>
                                <span>presença confirmada</span>
                            </label>
                        </div>
                        <div class="radio-option">
                            <input type="radio" id="nao" name="status" value="nao">
                            <label for="nao">
                                <strong>Não Irei</strong>
                            </label>
                        </div>
                    </div>
                </div>

                <button type="submit" class="btn-confirm">Enviar resposta</button>
            </form>

            <div id="message"></div>
        </main>
    </div>

    <button type="button" class="audio-toggle" id="audioToggle" aria-label="Tocar música de fundo" aria-pressed="false">
        <span class="audio-icon" aria-hidden="true"></span>
    </button>

    <audio id="themeSound" src="{{ url_for('static', filename='sound/theme.mp3') }}" preload="auto" autoplay loop></audio>
    <audio id="confirmSound" src="{{ url_for('static', filename='sound/confirmar.mp3') }}" preload="auto"></audio>

    <script>
        const confirmOption = document.getElementById('sim');
        const confirmSound = document.getElementById('confirmSound');
        const themeSound = document.getElementById('themeSound');
        const audioToggle = document.getElementById('audioToggle');
        let themeBlocked = false;

        themeSound.volume = 0.21;

        function removeAutoplayFallback() {
            document.removeEventListener('pointerdown', unlockThemeSound);
            document.removeEventListener('keydown', unlockThemeSound);
        }

        function updateAudioButton() {
            const isPlaying = !themeSound.paused;
            audioToggle.classList.toggle('is-playing', isPlaying);
            audioToggle.setAttribute('aria-pressed', String(isPlaying));
            audioToggle.setAttribute('aria-label', isPlaying ? 'Pausar música de fundo' : 'Tocar música de fundo');
        }

        async function playThemeSound() {
            try {
                await themeSound.play();
                themeBlocked = false;
                removeAutoplayFallback();
            } catch (err) {
                themeBlocked = true;
            }

            updateAudioButton();
        }

        function pauseThemeSound() {
            themeSound.pause();
            updateAudioButton();
        }

        function unlockThemeSound() {
            if (themeSound.paused) {
                playThemeSound();
            }
        }

        function playConfirmSound() {
            confirmSound.currentTime = 0;
            confirmSound.play().catch(() => console.log("Permissão de áudio necessária"));
        }

        audioToggle.addEventListener('pointerdown', (event) => event.stopPropagation());
        audioToggle.addEventListener('keydown', (event) => event.stopPropagation());
        document.addEventListener('pointerdown', unlockThemeSound);
        document.addEventListener('keydown', unlockThemeSound);
        themeSound.addEventListener('play', updateAudioButton);
        themeSound.addEventListener('pause', updateAudioButton);
        function toggleThemeSound() {
            if (themeSound.paused) {
                playThemeSound();
            } else {
                pauseThemeSound();
            }
        }

        function clickAudioToggleOnLoad() {
            if (themeSound.paused) {
                audioToggle.click();
            } else {
                updateAudioButton();
            }
        }

        audioToggle.addEventListener('click', toggleThemeSound);
        clickAudioToggleOnLoad();
        document.addEventListener('DOMContentLoaded', clickAudioToggleOnLoad);
        window.addEventListener('pageshow', clickAudioToggleOnLoad);
        themeSound.addEventListener('canplaythrough', clickAudioToggleOnLoad, { once: true });
        confirmOption.addEventListener('click', playConfirmSound);

        document.getElementById('rsvpForm').onsubmit = async (e) => {
            e.preventDefault();

            const formData = new FormData(e.target);
            const msgDiv = document.getElementById('message');

            try {
                const response = await fetch('/submit', {
                    method: 'POST',
                    body: formData
                });
                const result = await response.json();

                msgDiv.textContent = result.message;
                msgDiv.className = result.status === 'success' ? 'success' : 'error';
                msgDiv.style.display = 'block';

                if (result.status === 'success') {
                    e.target.reset();
                }
            } catch (err) {
                msgDiv.textContent = "Erro ao conectar com o Centro Pokémon.";
                msgDiv.className = 'error';
                msgDiv.style.display = 'block';
            }
        };
    </script>
</body>
</html>
