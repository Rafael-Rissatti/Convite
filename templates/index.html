<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Convite Pokémon - Eu escolho você!</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="invite-page">
    <div class="sky-badge badge-one"></div>
    <div class="sky-badge badge-two"></div>
    <div class="sky-badge badge-three"></div>
    <div class="grass-bottom"></div>

    <img class="pokemon-friend pikachu" src="{{ url_for('static', filename='pikachu1.png') }}" alt="Pikachu animado">
    <img class="pokemon-friend psyduck" src="{{ url_for('static', filename='psye.png') }}" alt="Psyduck animado">
    <img class="pokemon-friend meowth" src="{{ url_for('static', filename='Miaud.png') }}" alt="Meowth animado">
    <img class="pokemon-friend gengar" src="{{ url_for('static', filename='image/png-transparent-gengar-funny-monster-thumbnail.png') }}" alt="Gengar animado">
    <img class="pokemon-friend ghost-team" src="{{ url_for('static', filename='image/png-transparent-pikachu-gastly-pokemon-haunter-gengar-pikachu-purple-violet-cartoon-thumbnail.png') }}" alt="Pokémon fantasmas animados">
    <img class="pokemon-friend charmander" src="{{ url_for('static', filename='image/png-transparent-pokemon-charmander-pokemon-go-pikachu-ash-ketchum-charmander-pokemon-orange-fictional-character-cartoon-thumbnail.png') }}" alt="Charmander animado">

    <div class="pokedex-card">
        <header class="card-header">
            <div class="trainer-chip">Convite de treinador</div>
            <h1>Eu escolho você!</h1>
            <p>Prepare sua Pokébola e confirme presença para entrar nessa aventura.</p>
        </header>

        <div class="divider" aria-hidden="true"></div>

        <main class="card-body">
            <form id="rsvpForm">
                <div class="form-group">
                    <label for="nome"><span class="label-icon pokeball-mini"></span>Treinador(a)</label>
                    <input type="text" id="nome" name="nome" placeholder="Seu nome de treinador" required>
                </div>

                <div class="form-group">
                    <label for="acompanhante"><span class="label-icon lightning-mini"></span>Parceiro de jornada</label>
                    <input type="text" id="acompanhante" name="acompanhante" placeholder="Nome do acompanhante">
                </div>

                <div class="form-group">
                    <label><span class="label-icon badge-mini"></span>Vai participar da aventura?</label>
                    <div class="radio-grid">
                        <div class="radio-option">
                            <input type="radio" id="sim" name="status" value="sim" required>
                            <label for="sim">
                                <strong>Vou batalhar</strong>
                                <span>presença confirmada</span>
                            </label>
                        </div>
                        <div class="radio-option">
                            <input type="radio" id="nao" name="status" value="nao">
                            <label for="nao">
                                <strong>Estou sem HP</strong>
                                <span>não poderei ir</span>
                            </label>
                        </div>
                    </div>
                </div>

                <button type="submit" class="btn-confirm">Enviar confirmação</button>
            </form>

            <div id="message"></div>
        </main>
    </div>

    <audio id="themeSound" src="{{ url_for('static', filename='sound/theme.mp3') }}" preload="auto" loop></audio>
    <audio id="confirmSound" src="{{ url_for('static', filename='sound/confirmar.mp3') }}" preload="auto"></audio>

    <script>
        const confirmOption = document.getElementById('sim');
        const confirmSound = document.getElementById('confirmSound');
        const themeSound = document.getElementById('themeSound');

        themeSound.volume = 0.35;

        function playThemeSound() {
            themeSound.play().catch(() => {
                const unlockTheme = () => {
                    themeSound.play().catch(() => console.log("Permissão de áudio necessária"));
                    document.removeEventListener('click', unlockTheme);
                    document.removeEventListener('touchstart', unlockTheme);
                };

                document.addEventListener('click', unlockTheme);
                document.addEventListener('touchstart', unlockTheme);
            });
        }

        function playConfirmSound() {
            confirmSound.currentTime = 0;
            confirmSound.play().catch(() => console.log("Permissão de áudio necessária"));
        }

        window.addEventListener('load', playThemeSound);
        confirmOption.addEventListener('click', playConfirmSound);

        document.getElementById('rsvpForm').onsubmit = async (e) => {
            e.preventDefault();

            const formData = new FormData(e.target);
            const msgDiv = document.getElementById('message');

            try {
                const response = await fetch('/submit', {
                    method: 'POST',
                    body: formData
                });
                const result = await response.json();

                msgDiv.textContent = result.message;
                msgDiv.className = result.status === 'success' ? 'success' : 'error';
                msgDiv.style.display = 'block';

                if (result.status === 'success') {
                    e.target.reset();
                }
            } catch (err) {
                msgDiv.textContent = "Erro ao conectar com o Centro Pokémon.";
                msgDiv.className = 'error';
                msgDiv.style.display = 'block';
            }
        };
    </script>
</body>
</html>
