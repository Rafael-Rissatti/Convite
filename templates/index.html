
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Convite Pokémon - Eu escolho você!</title>
    <!-- Fontes Modernas -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;600;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --poke-red: #EE1515;
            --poke-white: #FFFFFF;
            --poke-dark: #2B2B2B;
            --poke-blue: #3B4CCA;
            --poke-yellow: #FFDE00;
            --poke-green: #4CAF50;
            --bg-top: #e0f7fa;
            --bg-bottom: #ffffff;
            --card-shadow: 0 20px 50px rgba(0,0,0,0.1);
            --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Lexend', sans-serif;
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(180deg, var(--bg-top) 0%, var(--bg-bottom) 100%);
            overflow-x: hidden;
            position: relative;
        }

        /* Ambientação Decorativa */
        .decoration {
            position: fixed;
            pointer-events: none;
            z-index: 0;
            opacity: 0.5;
        }
        
        .cloud {
            background: white;
            width: 120px;
            height: 45px;
            border-radius: 50px;
            position: absolute;
            animation: float-cloud 25s infinite linear;
        }
        
        @keyframes float-cloud {
            from { transform: translateX(-200px); }
            to { transform: translateX(110vw); }
        }

        .grass {
            bottom: 0;
            width: 100%;
            height: 20px;
            background: #81c784;
            position: fixed;
            z-index: 0;
        }

        /* Card Pokédex Moderna */
        .pokedex-card {
            background: var(--poke-white);
            width: 92%;
            max-width: 480px;
            border-radius: 35px;
            overflow: hidden;
            box-shadow: var(--card-shadow), 0 0 0 2px var(--poke-yellow);
            position: relative;
            z-index: 10;
            margin: 20px;
            border: 1px solid rgba(0,0,0,0.05);
        }

        /* Header Estilo Pokédex */
        .card-header {
            background-color: var(--poke-red);
            padding: 50px 30px 40px;
            text-align: center;
            color: white;
            position: relative;
        }

        .card-header h1 {
            margin: 0;
            font-size: 30px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.2);
        }

        .card-header p {
            margin: 10px 0 0;
            font-size: 16px;
            font-weight: 300;
            opacity: 0.95;
        }

        /* Divisor Pokébola Flat */
        .divider {
            height: 14px;
            background: var(--poke-dark);
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .divider::after {
            content: '';
            width: 54px;
            height: 54px;
            background: white;
            border: 10px solid var(--poke-dark);
            border-radius: 50%;
            position: absolute;
            z-index: 2;
            box-shadow: 0 4px 0 rgba(0,0,0,0.1);
        }

        .divider::before {
            content: '';
            width: 18px;
            height: 18px;
            background: var(--poke-yellow);
            border: 3px solid var(--poke-dark);
            border-radius: 50%;
            position: absolute;
            z-index: 3;
        }

        /* Corpo do Formulário */
        .card-body {
            padding: 50px 35px 40px;
        }

        .form-group {
            margin-bottom: 28px;
        }

        .form-group label {
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 600;
            font-size: 15px;
            margin-bottom: 10px;
            color: var(--poke-dark);
        }

        .form-group label span {
            font-size: 18px;
        }

        input[type="text"] {
            width: 100%;
            padding: 16px 20px;
            border: 2.5px solid #eee;
            border-radius: 16px;
            font-family: inherit;
            font-size: 15px;
            transition: var(--transition);
            outline: none;
            background: #fafafa;
        }

        input[type="text"]:focus {
            border-color: var(--poke-blue);
            background: white;
            box-shadow: 0 0 0 5px rgba(33, 137, 220, 0.1);
        }

        /* Seleção de Aventura (Botões Grandes) */
        .radio-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-top: 10px;
        }

        .radio-option {
            position: relative;
        }

        .radio-option input {
            position: absolute;
            opacity: 0;
            cursor: pointer;
        }

        .radio-option label {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px 15px;
            background: #f8f8f8;
            border: 2px solid transparent;
            border-radius: 20px;
            cursor: pointer;
            transition: var(--transition);
            text-align: center;
            height: 100%;
            margin: 0;
        }

        .radio-option label strong {
            display: block;
            font-size: 14px;
            margin-bottom: 4px;
        }

        .radio-option label span {
            font-size: 11px;
            font-weight: 400;
            opacity: 0.7;
        }

        .radio-option input:checked + label {
            background: rgba(33, 137, 220, 0.05);
            border-color: var(--poke-blue);
            color: var(--poke-blue);
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(33, 137, 220, 0.1);
        }

        /* Botão Principal */
        .btn-confirm {
            width: 100%;
            padding: 18px;
            background: var(--poke-blue);
            color: white;
            border: none;
            border-radius: 20px;
            font-size: 16px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            transition: var(--transition);
            box-shadow: 0 8px 20px rgba(33, 137, 220, 0.25);
            margin-top: 10px;
        }

        .btn-confirm:hover {
            transform: scale(1.03);
            background: #1a71b8;
            box-shadow: 0 10px 25px rgba(33, 137, 220, 0.35);
        }

        .btn-confirm:active {
            transform: scale(0.97);
        }

        /* Feedback de Mensagem */
        #message {
            margin-top: 25px;
            padding: 15px;
            border-radius: 15px;
            text-align: center;
            font-weight: 600;
            font-size: 14px;
            display: none;
            animation: fadeIn 0.4s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .success { background: #e8f5e9; color: #2e7d32; }
        .error { background: #ffebee; color: #c62828; }

        @media (max-width: 480px) {
            .card-body { padding: 45px 25px 35px; }
            .card-header h1 { font-size: 26px; }
            .radio-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <!-- Ambientação -->
    <div class="cloud" style="top: 15%; animation-delay: 0s;"></div>
    <div class="cloud" style="top: 40%; animation-delay: -8s; opacity: 0.6; width: 150px;"></div>
    <div class="cloud" style="top: 70%; animation-delay: -15s; width: 90px;"></div>
    <div class="grass"></div>

    <div class="pokedex-card">
        <header class="card-header">
            <h1>Eu escolho você!</h1>
            <p>Confirme sua presença no Centro Pokémon</p>
        </header>

        <div class="divider"></div>

        <main class="card-body">
            <form id="rsvpForm">
                <!-- Nome -->
                <div class="form-group">
                    <label for="nome"><span>🎒</span> Treinador(a)</label>
                    <input type="text" id="nome" name="nome" placeholder="Seu nome de Treinador" required>
                </div>

                <!-- Acompanhante -->
                <div class="form-group">
                    <label for="acompanhante"><span>🤝</span> Acompanhante</label>
                    <input type="text" id="acompanhante" name="acompanhante" placeholder="Nome do seu parceiro de jornada">
                </div>

                <!-- Status -->
                <div class="form-group">
                    <label><span>⚔️</span> Vai participar da aventura?</label>
                    <div class="radio-grid">
                        <div class="radio-option">
                            <input type="radio" id="sim" name="status" value="sim" required>
                            <label for="sim">
                                <strong>VOU BATALHAR</strong>
                                <span>na festa!</span>
                            </label>
                        </div>
                        <div class="radio-option">
                            <input type="radio" id="nao" name="status" value="nao">
                            <label for="nao">
                                <strong>ESTOU SEM HP</strong>
                                <span>não irei</span>
                            </label>
                        </div>
                    </div>
                </div>

                <button type="submit" class="btn-confirm">Enviar Confirmação</button>
            </form>

            <div id="message"></div>
        </main>
    </div>

    <!-- Áudio -->
    <audio id="pikachuSound" src="https://www.myinstants.com/media/sounds/pikachu.mp3"></audio>

    <script>
        document.getElementById('rsvpForm').onsubmit = async (e) => {
            e.preventDefault();
            
            // Som do Pikachu
            const sound = document.getElementById('pikachuSound');
            sound.currentTime = 0;
            sound.play().catch(err => console.log("Permissão de áudio necessária"));

            const formData = new FormData(e.target);
            const msgDiv = document.getElementById('message');
            
            try {
                const response = await fetch('/submit', {
                    method: 'POST',
                    body: formData
                });
                const result = await response.json();
                
                msgDiv.textContent = result.message;
                msgDiv.className = result.status === 'success' ? 'success' : 'error';
                msgDiv.style.display = 'block';
                
                if (result.status === 'success') {
                    e.target.reset();
                }
            } catch (err) {
                msgDiv.textContent = "Erro ao conectar com o Centro Pokémon.";
                msgDiv.className = 'error';
                msgDiv.style.display = 'block';
            }
        };
    </script>
</body>
</html>
