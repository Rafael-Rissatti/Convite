<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Centro Pokémon</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <style>
        .login-box {
            background: white;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            text-align: center;
            border: 5px solid #FFDE00;
        }
    </style>
</head>
<body>
    <div class="login-box">
        <h2 style="color: #3B4CCA;">Acesso do Mestre</h2>
        {% if error %}
            <p style="color: red;">{{ error }}</p>
        {% endif %}
        <form method="POST">
            <div class="form-group">
                <input type="password" name="password" placeholder="Senha Pokémon" required style="width: 100%; padding: 10px; margin-bottom: 10px;">
            </div>
            <button type="submit">Entrar no Painel</button>
        </form>
    </div>
</body>
</html>
